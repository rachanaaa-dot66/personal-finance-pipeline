# ─────────────────────────────────────────────────────────
# Personal Finance Pipeline
# Services: Spark, PostgreSQL, Metabase, Streamlit, Airflow
# ─────────────────────────────────────────────────────────

services:

  # ── Apache Spark Master ────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0-python3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8090:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/spark/data
      - ./scripts:/opt/spark/scripts
    networks:
      - finance-net

  # ── Apache Spark Worker ────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.0-python3
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8091:8081"
    volumes:
      - ./data:/opt/spark/data
      - ./scripts:/opt/spark/scripts
    depends_on:
      - spark-master
    networks:
      - finance-net

  # ── PostgreSQL Data Warehouse ──────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Metabase Dashboard ─────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: finance_user
      MB_DB_PASS: finance_pass
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-net

  # ── Streamlit Dashboard ────────────────────────────────
  streamlit:
    image: python:3.11-slim
    container_name: streamlit
    working_dir: /app
    command: >
      bash -c "pip install streamlit plotly psycopg2-binary pandas -q &&
               streamlit run streamlit_app.py
               --server.port=8501
               --server.address=0.0.0.0
               --theme.base=dark
               --theme.primaryColor=#64ffda
               --theme.backgroundColor=#0f1117
               --theme.secondaryBackgroundColor=#1a1f2e
               --theme.textColor=#ccd6f6"
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app.py:/app/streamlit_app.py
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-net

  # ── Airflow ────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.0
    container_name: airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://finance_user:finance_pass@postgres/finance_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create           --username admin           --password admin           --firstname Admin           --lastname User           --role Admin           --email admin@finance.com
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-net

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://finance_user:finance_pass@postgres/finance_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=finance_secret_key_2024
    command: airflow webserver
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - finance-net

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://finance_user:finance_pass@postgres/finance_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=finance_secret_key_2024
    command: airflow scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - finance-net

  # ── pgAdmin ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finance.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-net

# ── Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
  airflow_logs:

# ── Network ────────────────────────────────────────────
networks:
  finance-net:
    driver: bridge