# ─────────────────────────────────────────────────────────
# Personal Finance Pipeline
# Services: Spark Master + Worker, PostgreSQL, Metabase
# ─────────────────────────────────────────────────────────

services:

  # ── Apache Spark Master ────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0-python3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8090:8080"   # Spark Master Web UI → http://localhost:8090
      - "7077:7077"   # Workers connect here
    volumes:
      - ./data:/opt/spark/data
      - ./scripts:/opt/spark/scripts
    networks:
      - finance-net

  # ── Apache Spark Worker ────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.0-python3
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8091:8081"   # Spark Worker Web UI → http://localhost:8091
    volumes:
      - ./data:/opt/spark/data
      - ./scripts:/opt/spark/scripts
    depends_on:
      - spark-master
    networks:
      - finance-net

  # ── PostgreSQL Data Warehouse ──────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
    ports:
      - "5433:5432"   # Connect from host (DBeaver, pgAdmin, Power BI etc.)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Metabase Dashboard ─────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"   # Metabase UI → http://localhost:3000
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: finance_user
      MB_DB_PASS: finance_pass
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-net

# ── Volumes ────────────────────────────────────────────
volumes:
  postgres_data:

# ── Network ────────────────────────────────────────────
networks:
  finance-net:
    driver: bridge